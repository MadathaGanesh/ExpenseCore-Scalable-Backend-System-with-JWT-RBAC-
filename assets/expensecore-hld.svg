<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: Arial, sans-serif; background: #ffffff;">
  <title>ExpenseCore — High Level Design</title>
  <desc>System architecture diagram showing Client, API Gateway, Controllers, Spring Security, Service Layer, MySQL Database, Redis Cache, and cross-cutting concerns.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── CLIENT ── -->
  <rect x="270" y="24" width="140" height="52" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="340" y="46" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">Client</text>
  <text x="340" y="64" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Browser / Mobile / API</text>

  <!-- arrow: client -> gateway -->
  <line x1="340" y1="76" x2="340" y2="114" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="352" y="99" dominant-baseline="central" font-size="11" fill="#888780">HTTP</text>

  <!-- ── API GATEWAY ── -->
  <rect x="190" y="114" width="300" height="52" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">API Gateway</text>
  <text x="340" y="154" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Routing · Rate limit · Entry point</text>

  <!-- arrow: gateway -> spring security -->
  <line x1="340" y1="166" x2="340" y2="204" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── SPRING SECURITY ── -->
  <rect x="190" y="204" width="300" height="52" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="340" y="226" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#4A1B0C">Spring Security + JWT Filter</text>
  <text x="340" y="244" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">Validate token · Check Redis blacklist</text>

  <!-- arrow: security -> controllers -->
  <line x1="340" y1="256" x2="340" y2="292" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── CONTROLLERS ── -->
  <!-- Auth -->
  <rect x="44" y="292" width="132" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="110" y="314" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#042C53">Auth</text>
  <text x="110" y="332" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">Login · Register · Logout</text>
  <!-- User -->
  <rect x="192" y="292" width="132" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="258" y="314" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#042C53">User</text>
  <text x="258" y="332" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">Profile · Admin ops</text>
  <!-- Expense -->
  <rect x="340" y="292" width="132" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="406" y="314" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#042C53">Expense</text>
  <text x="406" y="332" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">CRUD · Filter · Page</text>
  <!-- Category -->
  <rect x="488" y="292" width="148" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="562" y="314" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#042C53">Category</text>
  <text x="562" y="332" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">Manage categories</text>

  <!-- Connectors: gateway -> outer controllers -->
  <path d="M274 166 Q180 220 110 292" fill="none" stroke="#aaa" stroke-width="0.7" marker-end="url(#arrow)"/>
  <path d="M406 166 Q500 220 562 292" fill="none" stroke="#aaa" stroke-width="0.7" marker-end="url(#arrow)"/>

  <!-- ── SERVICE LAYER ── -->
  <line x1="110" y1="344" x2="110" y2="428" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="258" y1="344" x2="258" y2="428" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="406" y1="344" x2="406" y2="428" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="562" y1="344" x2="562" y2="428" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Service container outline -->
  <rect x="30" y="402" width="620" height="100" rx="12" fill="none" stroke="#aaa" stroke-width="0.7" stroke-dasharray="5 3"/>
  <text x="46" y="420" dominant-baseline="central" font-size="11" fill="#888780">Service layer</text>

  <!-- Auth Service -->
  <rect x="44" y="414" width="132" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="110" y="436" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#04342C">Auth Service</text>
  <text x="110" y="454" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">JWT gen · Blacklist</text>
  <!-- User Service -->
  <rect x="192" y="414" width="132" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="258" y="436" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#04342C">User Service</text>
  <text x="258" y="454" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">RBAC · Ownership</text>
  <!-- Expense Service -->
  <rect x="340" y="414" width="132" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="406" y="436" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#04342C">Expense Service</text>
  <text x="406" y="454" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Filter · Paginate</text>
  <!-- Category Service -->
  <rect x="488" y="414" width="148" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="562" y="436" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#04342C">Category Service</text>
  <text x="562" y="454" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Admin-only ops</text>

  <!-- ── DATA LAYER ARROWS ── -->
  <line x1="258" y1="502" x2="220" y2="590" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="406" y1="502" x2="310" y2="590" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="562" y1="502" x2="390" y2="590" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="110" y1="502" x2="530" y2="590" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── MYSQL ── -->
  <rect x="114" y="590" width="320" height="106" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="274" y="612" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#173404">MySQL Database</text>
  <rect x="130" y="626" width="62" height="26" rx="5" fill="none" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
  <text x="161" y="639" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#27500A">users</text>
  <rect x="202" y="626" width="56" height="26" rx="5" fill="none" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
  <text x="230" y="639" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#27500A">roles</text>
  <rect x="268" y="626" width="92" height="26" rx="5" fill="none" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
  <text x="314" y="639" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#27500A">permissions</text>
  <rect x="168" y="660" width="74" height="26" rx="5" fill="none" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
  <text x="205" y="673" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#27500A">expenses</text>
  <rect x="252" y="660" width="88" height="26" rx="5" fill="none" stroke="#3B6D11" stroke-width="0.5" opacity="0.6"/>
  <text x="296" y="673" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#27500A">categories</text>

  <!-- ── REDIS ── -->
  <rect x="462" y="590" width="184" height="106" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="554" y="612" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#412402">Redis Cache</text>
  <text x="554" y="634" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">JWT blacklist</text>
  <text x="554" y="652" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">SHA-256 hash key</text>
  <text x="554" y="670" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">TTL = token lifetime</text>
  <text x="554" y="688" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">Auto-expiry, no leaks</text>

  <!-- ── CROSS-CUTTING ── -->
  <text x="340" y="730" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780" opacity="0.7">Cross-cutting concerns</text>
  <line x1="44" y1="740" x2="636" y2="740" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Logging -->
  <rect x="44" y="752" width="182" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="135" y="774" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">Logging</text>
  <text x="135" y="792" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">SLF4J · MDC · correlationId</text>

  <!-- Validation -->
  <rect x="246" y="752" width="188" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="340" y="774" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">Validation</text>
  <text x="340" y="792" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Jakarta · @Valid · ApiResponse</text>

  <!-- Exception Handling -->
  <rect x="454" y="752" width="182" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="545" y="774" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">Exception handler</text>
  <text x="545" y="792" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">@RestControllerAdvice</text>

  <!-- ── RBAC BANNER ── -->
  <rect x="44" y="836" width="592" height="52" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="340" y="857" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#4A1B0C">RBAC — Role &amp; Permission (DB-driven, Many-to-Many)</text>
  <text x="340" y="876" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">ROLE_USER · ROLE_ADMIN → PERMISSION_READ · PERMISSION_WRITE · @PreAuthorize</text>
</svg>
